<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="ForDI.css">
    <link rel="icon" href="net/БалансЛого.png" type="image/png">
    <title>Ужины</title>
</head>

<body>

<header>
    <nav>
        <ul>
            <li><img src="net/БалансЛого.png" class="logo" width="70px"></li>
            <li><a href="Главная.html">Главная</a></li>
            <li><a href="Главная.html#Info">Информация о ПП</a></li>
            <li><a href="Главная.html#Contacts">О нас</a></li>
        </ul>
    </nav>
</header>

<h1>Ужины</h1>

<div class="searchBox">
    <input type="text" id="search" placeholder="Поиск по рецептам...">
</div>

<!-- Контейнер, куда загрузятся рецепты из XML -->
<div id="recipes"></div>

<footer>
    <hr>
    <p>Вкусное продолжение следует...</p>
</footer>

<!-- ===================== JS внутри HTML ===================== -->
<script>
async function loadXML() {
    const response = await fetch("dinner.xml");
    const xmlText = await response.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, "text/xml");

    const recipes = xml.getElementsByTagName("recipe");
    const container = document.getElementById("recipes");

    for (let recipe of recipes) {
        let name = recipe.getElementsByTagName("name")[0].textContent;

        let kcal = recipe.getElementsByTagName("kcal")[0].textContent;
        let proteins = recipe.getElementsByTagName("proteins")[0].textContent;
        let fats = recipe.getElementsByTagName("fats")[0].textContent;
        let carbs = recipe.getElementsByTagName("carbs")[0].textContent;

        let ingredients = [...recipe.getElementsByTagName("item")].map(i => i.textContent);
        let steps = [...recipe.getElementsByTagName("step")].map(s => s.textContent);

        let photo = recipe.getElementsByTagName("photo")[0].textContent;

        let block = document.createElement("div");
        block.className = "genBl";

        block.innerHTML = `
            <div class="forPic">
                <img src="${photo}">
                <p class="name"><b>${name}<br>КБЖУ: ${kcal}/${proteins}/${fats}/${carbs}</b></p>
            </div>

            <div class="text">
                <p><b>Ингредиенты:</b><br>${ingredients.join("<br>")}<br>
                <b>Приготовление:</b><br>${steps.join("<br>")}</p>
            </div>
        `;

        container.appendChild(block);
    }
}

loadXML();

// Поиск по рецептам
document.getElementById("search").addEventListener("input", function() {
    let value = this.value.toLowerCase().trim();

    document.querySelectorAll(".genBl").forEach(block => {
        let text = block.innerText.toLowerCase();
        block.style.display = text.includes(value) ? "flex" : "none";
    });
});
</script>

</body>
</html>
